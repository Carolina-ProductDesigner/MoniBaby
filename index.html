  <main class="content">

    <h1 class="title">
      <span class="title__baby reveal" style="--d:.55s">BABY</span>
      <span class="title__name reveal" style="--d:.68s">De la Vega Delgado</span>

    <section class="count-block">
      <p class="count-block__lead reveal" style="--d:.96s" id="lead">Nazco aproximadamente en:</p>

      <div class="count reveal" style="--d:1.06s" aria-hidden="true">
        <div class="count__unit">
          <span class="count__value" id="days">0</span>
          <span class="count__label">DIAS</span>
        </div>
        <div class="count__unit">
          <span class="count__value" id="hours">00</span>
          <span class="count__label">HORAS</span>
        </div>
        <div class="count__unit">
          <span class="count__value" id="minutes">00</span>
          <span class="count__label">MIN</span>
        </div>
      </div>
      <p class="sr-only" id="srCount" aria-live="polite"></p>
    </section>

    <section class="gifts">
      <p class="gifts__lead reveal" style="--d:1.2s">Si me quieres regalar algo, mis papás hicieron estas mesas de regalos con lo que me gustaría:</p>
      <div class="gifts__row reveal" style="--d:1.32s">
        <a class="btn" id="gift1" href="#" target="_blank" rel="noopener">LIVERPOOL</a>
        <a class="btn" id="gift2" href="#" target="_blank" rel="noopener">CANTIA</a>
      </div>
    </section>

    <p class="thanks reveal" style="--d:1.46s">¡Gracias por quererme y esperarme con tanta emoción!</p>
